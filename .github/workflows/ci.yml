name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-core:
    name: Core - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dynabots-core
        run: pip install -e "packages/core[dev]"

      - name: Lint
        run: ruff check packages/core/dynabots_core/

      - name: Test
        run: pytest packages/core/tests/ -v

  test-orc:
    name: ORC - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dynabots-core
        run: pip install -e packages/core

      - name: Install dynabots-orc
        run: pip install -e "packages/orc[dev]"

      - name: Lint
        run: ruff check packages/orc/dynabots_orc/

      - name: Test
        run: pytest packages/orc/tests/ -v
