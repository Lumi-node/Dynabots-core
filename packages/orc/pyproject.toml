[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dynabots-orc"
version = "0.1.0"
description = "Brutalist hierarchy orchestration - leadership through competition"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.10"
authors = [
    { name = "DynaBots Team" }
]
keywords = [
    "agents",
    "orchestration",
    "multi-agent",
    "competitive",
    "hierarchy",
    "ai"
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "dynabots-core>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/Lumi-node/Dynabots"
Documentation = "https://github.com/Lumi-node/Dynabots/tree/main/packages/orc#readme"
Repository = "https://github.com/Lumi-node/Dynabots"

[tool.hatch.build.targets.wheel]
packages = ["dynabots_orc"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
