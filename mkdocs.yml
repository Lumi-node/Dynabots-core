site_name: DynaBots
site_url: https://lumi-node.github.io/Dynabots-core/
site_description: "Multi-agent orchestration for Python. Protocol-first foundation for building AI agent systems."
repo_url: https://github.com/Lumi-node/Dynabots-core
repo_name: Lumi-node/Dynabots-core

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [packages/core]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_bases: true
            heading_level: 3

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Lumi-node/Dynabots-core
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/dynabots-core/

copyright: Copyright &copy; 2025-2026 DynaBots Contributors — Apache 2.0 License

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
      - Core Concepts: getting-started/concepts.md
  - Protocols:
      - Agent: protocols/agent.md
      - LLM Provider: protocols/llm.md
      - Judge: protocols/judge.md
      - Tool: protocols/tool.md
      - Storage: protocols/storage.md
  - Providers:
      - Overview: providers/overview.md
      - Ollama: providers/ollama.md
      - OpenAI: providers/openai.md
      - Anthropic: providers/anthropic.md
  - Value Objects:
      - TaskResult: value-objects/task-result.md
  - Ecosystem:
      - ORC: ecosystem/orc.md
      - Roadmap: ecosystem/roadmap.md
